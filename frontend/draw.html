<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽牌 · 仙宝塔罗</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/draw.css?v=8">
<style>
/* draw page header with back button */
.draw-header {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  padding: 4px 16px;
  background: rgba(10,0,22,0.85);
  border-bottom: 1px solid rgba(212,168,83,0.15);
  position: relative;
  z-index: 100;
}

.draw-back-btn {
  background: none;
  border: 1px solid rgba(212,168,83,0.3);
  color: var(--gold, #d4a853);
  font-size: 0.8rem;
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}
.draw-back-btn:hover {
  background: rgba(212,168,83,0.12);
  border-color: var(--gold);
}

#drawCompleteBtn {
  padding: 4px 12px;
  border-radius: 4px;
  border: none;
  background: linear-gradient(135deg, var(--gold, #d4a853), #b8943a);
  color: #1a0a2e;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
#drawCompleteBtn.visible {
  opacity: 1;
  pointer-events: auto;
}
#drawCompleteBtn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(212,168,83,0.4);
}
</style>
</head>
<body class="draw-page">
  <div class="draw-header">
    <button id="drawCompleteBtn">✅</button>
    <button class="draw-back-btn" id="backBtn">❌</button>
  </div>
  <div id="fan-area">
    <div class="fan-row" id="fan-row-1"></div>
  </div>
  <div id="drawn-bar">
    <div class="drawn-scroll" id="drawn-scroll">
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
    </div>
  </div>
  <script src="js/draw.js?v=22"></script>
</body>
</html>
