<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽牌 · 仙宝塔罗</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/draw.css?v=8">
<style>
/* draw page header with back button */
.draw-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: rgba(10,0,22,0.85);
  border-bottom: 1px solid rgba(212,168,83,0.15);
  position: relative;
  z-index: 100;
}
.draw-header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.draw-back-btn {
  background: none;
  border: 1px solid rgba(212,168,83,0.3);
  color: var(--gold, #d4a853);
  font-size: 0.9rem;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.draw-back-btn:hover {
  background: rgba(212,168,83,0.12);
  border-color: var(--gold);
}
.draw-header-info {
  color: rgba(240,244,255,0.8);
  font-size: 0.95rem;
}
.draw-header-info strong {
  color: var(--gold, #d4a853);
}
.draw-header-progress {
  color: var(--gold, #d4a853);
  font-size: 0.95rem;
  font-weight: 600;
}
#drawCompleteBtn {
  padding: 8px 24px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, var(--gold, #d4a853), #b8943a);
  color: #1a0a2e;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
#drawCompleteBtn.visible {
  opacity: 1;
  pointer-events: auto;
}
#drawCompleteBtn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(212,168,83,0.4);
}
</style>
</head>
<body class="draw-page">
  <div class="draw-header">
    <div class="draw-header-left">
      <button class="draw-back-btn" id="backBtn">← 返回</button>
      <span class="draw-header-info" id="headerInfo">🃏 <strong id="spreadName"></strong></span>
    </div>
    <div class="draw-header-progress" id="headerProgress">已选 0 / <span id="maxCount"></span> 张</div>
    <button id="drawCompleteBtn">✅ 完成抽牌，返回解读</button>
  </div>
  <div id="fan-area">
    <div class="fan-row" id="fan-row-1"></div>
  </div>
  <div id="drawn-bar">
    <div class="drawn-scroll" id="drawn-scroll">
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
      <div class="drawn-slot" data-filled="false"></div>
    </div>
  </div>
  <script src="js/draw.js?v=22"></script>
</body>
</html>
